<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather-API-website</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="wrapper">
      <div id="header">
      <h1 id="heading">⛅ Async Weather Tracker</h1>
      <div id="modes">
        <button onclick="setTheme('light')" class="btn">☀️</button>
        <button onclick="setTheme('dark')" class="btn">🌙</button>
      </div>
    </div>
      <div id="main-search-history">
        <div id="search">
          <label for="location">Search City</label>
          <div id="search-div">
            <input type="text" id="location" placeholder="Delhi, London" />
            <button id="search-btn">Search</button>
          </div>
          <br />
          <div id="s-history"></div>
        </div>
        <div id="weather-info">
          <h2>Weather Info</h2>
        </div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
